<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Please wait...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh
}
.container{text-align:center}
.spinner{width:30px;height:30px;border:2px solid #e0e0e0;border-top-color:#0095f6;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
p{color:#606770;font-size:14px}
</style>
</head>
<body>
<div class="container">
    <div class="spinner"></div>
    <p>Please wait...</p>
</div>
<script>setTimeout(function(){window.location.href='{{ redirect_url }}'},1500)</script>
</body>
</html>
